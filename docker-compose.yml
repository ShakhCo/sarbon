services:
  web:
    build:
      context: .
    image: sarbon-dispatcher
    container_name: sarbon-dispatcher
    ports:
      - "8770:8770"
    env_file:
      # Committed task credentials — makes a clean clone runnable.
      - path: .env.docker
        required: true
      # Optional local override (untracked); wins over .env.docker.
      - path: .env.local
        required: false
    restart: unless-stopped
